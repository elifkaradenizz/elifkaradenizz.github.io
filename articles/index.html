<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Elif Karadeniz</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="dark-mode">

<!-- NAVBAR -->
<!-- NAVBAR -->
<nav class="navbar">
  <div class="navbar-center">

    <span class="navbar-name" id="navbar-name">Elif Karadeniz</span>

    <ul class="navbar-links">
      <li><a href="/"><span class="en">Home</span><span class="tr" style="display:none;">Ana Sayfa</span></a></li>
      <li><a href="/about/"><span class="en">About</span><span class="tr" style="display:none;">Hakkımda</span></a></li>
      <li><a href="/projects/"><span class="en">Projects</span><span class="tr" style="display:none;">Projeler</span></a></li>
      <li><a href="/articles/"><span class="en">Articles</span><span class="tr" style="display:none;">Yazılar</span></a></li>
       <li><a href="/conference/"><span class="en">Conference</span><span class="tr" style="display:none;">Konferans</span></a></li>
    </ul>

    <input type="text" id="search" placeholder="Search...">

    <div class="lang-wrapper">
      <button class="lang-btn active" onclick="setLang('en')">EN</button>
      <button class="lang-btn" onclick="setLang('tr')">TR</button>
      <button id="theme-toggle"><i class="fas fa-moon"></i></button>
    </div>

  </div>
</nav>



<!-- FOOTER -->
<footer>
  <p class="en">© 2026 Elif Karadeniz</p>
  <p class="tr" style="display:none;">© 2026 Elif Karadeniz</p>
</footer>

<!-- JS -->
<!-- JS -->
<script>
/* LANGUAGE (TEK SİSTEM) */
function setLang(lang){
  document.querySelectorAll('.en').forEach(el => el.style.display = (lang==='en')?'':'none');
  document.querySelectorAll('.tr').forEach(el => el.style.display = (lang==='tr')?'':'none');

  document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
  document.querySelectorAll('.lang-btn')[lang==='en'?0:1].classList.add('active');

  localStorage.setItem('lang', lang);
}

/* LOAD */
const savedLang = localStorage.getItem('lang') || 'en';
setLang(savedLang);

/* THEME */
document.getElementById('theme-toggle').onclick = () => {
  document.body.classList.toggle('light-mode');
};

/* SEARCH */
document.getElementById('search').addEventListener('input', e => {
  const val = e.target.value.toLowerCase();
  document.querySelectorAll('.project-item').forEach(card=>{
    card.style.display = card.innerText.toLowerCase().includes(val) ? 'flex':'none';
  });
});

/* LOGO CLICK */
document.getElementById('navbar-name').addEventListener('click',()=>{window.location.href='/'});
</script>

</body>
</html>
