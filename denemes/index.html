<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Project Detail</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Segoe UI", sans-serif;
}

body {
  background: #0d1117;
  color: #e6edf3;
  padding: 40px;
}

.container {
  max-width: 1200px;
  margin: auto;
}

/* TITLE */
.title {
  font-size: 34px;
  color: #3fb950;
}

.subtitle {
  color: #8b949e;
  margin-bottom: 25px;
}

/* GRID */
.content {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 20px;
}

/* CODE */
.code {
  background: #161b22;
  border-radius: 15px;
  overflow: hidden;
}

.code-header {
  background: #21262d;
  padding: 10px;
  display: flex;
  gap: 8px;
}

.dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
}

.red { background: #ff5f56; }
.yellow { background: #ffbd2e; }
.green { background: #27c93f; }

.code pre {
  padding: 20px;
  font-size: 14px;
  color: #c9d1d9;
}

/* DASHBOARD */
.dashboard {
  display: flex;
  flex-direction: column;
  gap: 15px;
}

.dash-card {
  background: #161b22;
  padding: 15px;
  border-radius: 12px;
}

/* CHART */
canvas {
  margin-top: 10px;
}

/* BUTTON */
.btn {
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #3fb950;
  text-align: center;
  cursor: pointer;
}

.btn:hover {
  background: #3fb950;
  color: #0d1117;
}

</style>
</head>

<body>

<div class="container">

<h1 class="title">LLM File Analysis Chatbot</h1>
<p class="subtitle">LLM + Streamlit based intelligent file analyzer</p>

<div class="content">

  <!-- CODE -->
  <div class="code">
    <div class="code-header">
      <div class="dot red"></div>
      <div class="dot yellow"></div>
      <div class="dot green"></div>
    </div>

<pre>
from langchain import LLM

model = LLM("llama3")

response = model.ask("Analyze file")

print(response)
</pre>

  </div>

  <!-- DASHBOARD -->
  <div class="dashboard">

    <!-- SCORE CHART -->
    <div class="dash-card">
      <p>Performance</p>
      <canvas id="scoreChart"></canvas>
    </div>

    <!-- FILE SIZE ANALYSIS -->
    <div class="dash-card">
      <p>File Size Performance</p>
      <canvas id="barChart"></canvas>
    </div>

    <!-- ACTION -->
    <div class="btn" onclick="history.back()">Back</div>

  </div>

</div>

</div>

<script>

/* GAUGE (Doughnut) */
new Chart(document.getElementById("scoreChart"), {
  type: "doughnut",
  data: {
    labels: ["Score", "Remaining"],
    datasets: [{
      data: [92, 8],
      backgroundColor: ["#3fb950", "#30363d"],
      borderWidth: 0
    }]
  },
  options: {
    plugins: {
      legend: { display: false }
    }
  }
});

/* BAR CHART */
new Chart(document.getElementById("barChart"), {
  type: "bar",
  data: {
    labels: ["1MB", "5MB", "10MB"],
    datasets: [{
      label: "Response Time",
      data: [0.5, 1.2, 2.0],
      backgroundColor: "#3fb950"
    }]
  },
  options: {
    plugins: {
      legend: { display: false }
    }
  }
});

</script>

</body>
</html>
