<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Elif Karadeniz</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="dark-mode">

<!-- NAVBAR -->
<nav class="navbar">
  <div class="navbar-center">

    <span class="navbar-name" id="navbar-name">Elif Karadeniz</span>


<ul class="navbar-links">
  <li><a href="/"><span class="en">Home</span><span class="tr" style="display:none;">Ana Sayfa</span></a></li>
  <li><a href="/about/"><span class="en">About</span><span class="tr" style="display:none;">Hakkımda</span></a></li>
  <li><a href="/projects/"><span class="en">Projects</span><span class="tr" style="display:none;">Projeler</span></a></li>
  <li><a href="/articles/"><span class="en">Articles</span><span class="tr" style="display:none;">Yazılar</span></a></li>
  <li><a href="/conference/"><span class="en">Conference</span><span class="tr" style="display:none;">Konferans</span></a></li>
</ul>

    <input type="text" id="search" placeholder="Search...">
    <div class="navbar-controls">
      <button id="btn-en">EN</button>
      <button id="btn-tr">TR</button>
      <button id="theme-toggle"><i class="fas fa-moon"></i></button>
    </div>

  </div>
</nav>


  


<!-- FOOTER -->
<footer>
  <p class="en">© 2026 Elif Karadeniz</p>
  <p class="tr" style="display:none;">© 2026 Elif Karadeniz</p>
</footer>



  <!-- JS -->
<script>
/* THEME */
const themeBtn = document.getElementById('theme-toggle');
themeBtn.addEventListener('click', () => {
  document.body.classList.toggle('light-mode');
  const icon = themeBtn.querySelector('i');
  icon.classList.toggle('fa-sun');
  icon.classList.toggle('fa-moon');
});

/* LANGUAGE */
const btnEN = document.getElementById('btn-en');
const btnTR = document.getElementById('btn-tr');
function setLanguage(lang){
  document.querySelectorAll('.en').forEach(el=>el.style.display=(lang==='en')?'':'none');
  document.querySelectorAll('.tr').forEach(el=>el.style.display=(lang==='tr')?'':'none');
  btnEN.classList.toggle('active', lang==='en');
  btnTR.classList.toggle('active', lang==='tr');
  localStorage.setItem("lang", lang);
}
btnEN.addEventListener("click",()=>setLanguage("en"));
btnTR.addEventListener("click",()=>setLanguage("tr"));
setLanguage(localStorage.getItem("lang")||"en");

/* SEARCH */
const searchInput = document.getElementById('search');
if(searchInput){
  searchInput.addEventListener('input',()=>{
    const term = searchInput.value.toLowerCase();
    document.querySelectorAll('.item-card').forEach(card=>{
      const title = card.dataset.title.toLowerCase();
      card.style.display = title.includes(term)?'block':'none';
    });
  });
}

/* LOGO CLICK */
document.getElementById('navbar-name').addEventListener('click',()=>{window.location.href='/'});
</script>

</body>
</html>
